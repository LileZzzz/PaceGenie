services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: pacegenie-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: pacegenie
      POSTGRES_PASSWORD: password
      POSTGRES_DB: pacegenie
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pacegenie -d pacegenie"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
