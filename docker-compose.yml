services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: pacegenie-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: pacegenie
      POSTGRES_PASSWORD: password
      POSTGRES_DB: pacegenie
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pacegenie -d pacegenie"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: .
    container_name: pacegenie-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      DATABASE_URL: postgresql://pacegenie:password@postgres:5432/pacegenie
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
