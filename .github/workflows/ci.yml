name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  # ── Backend ──────────────────────────────────────────────────────────────
  backend:
    name: Backend · type check + tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: pacegenie
          POSTGRES_PASSWORD: password
          POSTGRES_DB: pacegenie
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U pacegenie"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    env:
      LLM_MODEL: ${{ secrets.LLM_MODEL }}
      LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
      LLM_BASE_URL: ${{ secrets.LLM_BASE_URL }}
      DATABASE_URL: postgresql://pacegenie:password@localhost:5432/pacegenie
      LANGSMITH_TRACING: "false"

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Install dependencies
        run: uv sync --frozen

      - name: Smoke test imports
        run: uv run python -c "from agent.graph import get_graph; print('imports ok')"

      - name: Run tests
        run: uv run pytest tests/ -v --tb=short

  # ── Frontend ─────────────────────────────────────────────────────────────
  frontend:
    name: Frontend · type check + build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build

  # ── Docker build check ────────────────────────────────────────────────────
  docker:
    name: Docker · build image
    runs-on: ubuntu-latest
    needs: backend

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        env:
          IMAGE_TAG: ${{ github.sha }}
        run: docker build -t pacegenie-backend:"${IMAGE_TAG}" .
